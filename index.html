<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Claude AI Assistant</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <!-- Tableau Extensions API is injected by Tableau Desktop/Cloud automatically -->
  <!-- Fallback script for running in a standalone browser -->
  <script>
    // If running outside Tableau, define a stub so the app degrades gracefully
    if (typeof tableau === 'undefined') {
      window.__tableauNotAvailable = true;
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f11;
      --surface:   #18181c;
      --border:    #2a2a32;
      --accent:    #cc785c;
      --accent-lo: rgba(204,120,92,0.12);
      --text:      #e8e6e1;
      --muted:     #7a7880;
      --user-bg:   #1f1f26;
      --claude-bg: #1a1a20;
      --radius:    10px;
      --font:      'Inter', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #header .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    #header .title {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      flex: 1;
    }

    #header .subtitle {
      font-size: 11px;
      color: var(--muted);
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #status-dot.ready   { background: #5cb85c; }
    #status-dot.loading { background: var(--accent); }
    #status-dot.error   { background: #c0392b; }

    /* ── Context bar ── */
    #context-bar {
      padding: 6px 14px;
      background: var(--accent-lo);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      min-height: 28px;
    }
    #context-bar .ctx-label {
      color: var(--accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 10px;
      flex-shrink: 0;
    }
    #context-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Settings panel ── */
    #settings-panel {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: none;
      flex-shrink: 0;
    }
    #settings-panel label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 500;
    }
    #settings-panel input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--font);
      outline: none;
      margin-bottom: 8px;
    }
    #settings-panel input:focus { border-color: var(--accent); }
    #settings-panel .save-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    #settings-panel .save-btn:hover { opacity: 0.88; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 100%;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 2px;
    }

    .msg.user .msg-label  { color: var(--accent); }
    .msg.claude .msg-label { color: #7b9fbf; }

    .msg-body {
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-body {
      background: var(--user-bg);
      border: 1px solid var(--border);
    }

    .msg.claude .msg-body {
      background: var(--claude-bg);
      border: 1px solid #22222c;
    }

    .msg.system .msg-body {
      background: var(--accent-lo);
      border: 1px solid rgba(204,120,92,0.2);
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    /* Typing indicator */
    .typing-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1; }
    }

    /* ── Suggestions ── */
    #suggestions {
      padding: 0 14px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }
    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    /* ── Input area ── */
    #input-area {
      padding: 10px 14px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font);
      resize: none;
      outline: none;
      min-height: 38px;
      max-height: 100px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #send-btn:hover:not(:disabled) { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; fill: #fff; }

    #input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    #input-footer .hint {
      font-size: 10px;
      color: var(--muted);
    }
    #settings-toggle {
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font);
      text-decoration: underline;
    }
    #settings-toggle:hover { color: var(--accent); }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 20px;
      text-align: center;
      gap: 8px;
      color: var(--muted);
    }
    #empty-state .es-icon {
      font-size: 32px;
      margin-bottom: 4px;
    }
    #empty-state h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    #empty-state p {
      font-size: 12px;
      max-width: 200px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="logo">✦</div>
    <div style="flex:1">
      <div class="title">Claude AI Assistant</div>
    </div>
    <div id="status-dot" title="Initialising…"></div>
  </div>

  <!-- Context bar -->
  <div id="context-bar">
    <span class="ctx-label">View</span>
    <span id="context-name">Connecting to dashboard…</span>
  </div>

  <!-- Settings panel (hidden by default) -->
  <div id="settings-panel">
    <label>Anthropic API Key</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-…" autocomplete="off"/>
    <label>System prompt (optional)</label>
    <input type="text" id="system-prompt-input" placeholder="You are a helpful data analyst…"/>
    <button class="save-btn" onclick="saveSettings()">Save</button>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div id="empty-state">
      <div class="es-icon">✦</div>
      <h3>Ask about your data</h3>
      <p>Claude will read the current view and answer your questions.</p>
    </div>
  </div>

  <!-- Suggestions -->
  <div id="suggestions"></div>

  <!-- Input -->
  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" rows="1" placeholder="Ask a question about this data…"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div id="input-footer">
      <span class="hint">Enter to send · Shift+Enter for new line</span>
      <button id="settings-toggle" onclick="toggleSettings()">⚙ API key</button>
    </div>
  </div>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let apiKey        = localStorage.getItem('claude_api_key') || '';
let systemPrompt  = localStorage.getItem('claude_system_prompt') || '';
let conversationHistory = [];
let dashboardData = null;
let dashboardName = '';
let isLoading     = false;
let tableauReady  = false;

// Default suggestions (swapped for data-aware ones once loaded)
const DEFAULT_SUGGESTIONS = [
  'Summarise this data',
  'What are the key trends?',
  'Any anomalies to flag?',
  'What does this tell us?',
];

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
  }
  if (systemPrompt) {
    document.getElementById('system-prompt-input').value = systemPrompt;
  }

  // Show settings if no key saved
  if (!apiKey) {
    document.getElementById('settings-panel').style.display = 'block';
    setStatus('error', 'API key required');
  }

  renderSuggestions(DEFAULT_SUGGESTIONS);
  initTableau();

  // Auto-resize textarea
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
  });

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
});

// ── Tableau Init ───────────────────────────────────────────────────────────
function showDiag(msg) {
  let bar = document.getElementById('diag-bar');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'diag-bar';
    bar.style.cssText = 'background:#7b2d2d;color:#fff;font-size:11px;padding:6px 14px;word-break:break-all;flex-shrink:0;';
    document.getElementById('app').insertBefore(bar, document.getElementById('context-bar'));
  }
  bar.textContent = '⚠ ' + msg;
}

function initTableau() {
  if (typeof tableau === 'undefined') {
    showDiag('tableau object undefined — Extensions API script did not load.');
    setDemoMode();
    return;
  }
  if (!tableau.extensions) {
    showDiag('tableau.extensions undefined — API loaded but extensions not available.');
    setDemoMode();
    return;
  }
  showDiag('Calling initializeAsync…');
  tableau.extensions.initializeAsync().then(() => {
    const bar = document.getElementById('diag-bar');
    if (bar) bar.remove();
    tableauReady = true;
    loadDashboardContext();
  }).catch(err => {
    showDiag('initializeAsync failed: ' + (err && (err.message || JSON.stringify(err))));
    setDemoMode();
  });
}

function setDemoMode() {
  tableauReady = false;
  dashboardName = 'Demo Mode (no dashboard connected)';
  dashboardData = { note: 'Running outside Tableau – no live data available.' };
  document.getElementById('context-name').textContent = dashboardName;
  setStatus('ready', 'Demo mode');
  updateSendButton();
}

async function loadDashboardContext() {
  try {
    const dashboard = tableau.extensions.dashboardContent.dashboard;
    dashboardName   = dashboard.name;

    document.getElementById('context-name').textContent = dashboardName;
    setStatus('loading', 'Fetching data…');

    // Collect data from all worksheets
    const sheets    = dashboard.worksheets;
    const sheetData = {};

    await Promise.all(sheets.map(async (sheet) => {
      try {
        const st = await sheet.getSummaryDataAsync();
        const cols = st.columns.map(c => c.fieldName);
        const rows = st.data.slice(0, 200).map(row =>
          Object.fromEntries(cols.map((c, i) => [c, row[i].formattedValue]))
        );
        sheetData[sheet.name] = { columns: cols, rows };
      } catch(e) {
        sheetData[sheet.name] = { error: 'Could not read sheet data' };
      }
    }));

    dashboardData = sheetData;
    setStatus('ready', 'Ready');
    updateSendButton();

    // Suggest data-aware questions
    renderSuggestions([
      `Summarise ${dashboardName}`,
      'What are the top performers?',
      'Any concerning trends?',
      'Compare this period to last',
    ]);

    // Mark context bar green
    document.getElementById('context-bar').style.background = 'rgba(92,184,92,0.08)';

    // Listen for filter/mark change events to refresh data
    sheets.forEach(sheet => {
      try {
        sheet.addEventListener(
          tableau.TableauEventType.FilterChanged,
          () => loadDashboardContext()
        );
        sheet.addEventListener(
          tableau.TableauEventType.MarkSelectionChanged,
          () => loadDashboardContext()
        );
      } catch(e) { /* not all sheet types support events */ }
    });

  } catch(err) {
    console.error('Failed to load dashboard context:', err);
    setStatus('error', 'Could not read dashboard');
    document.getElementById('context-name').textContent = 'Error reading dashboard';
  }
}

// ── Settings ───────────────────────────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function saveSettings() {
  apiKey       = document.getElementById('api-key-input').value.trim();
  systemPrompt = document.getElementById('system-prompt-input').value.trim();
  localStorage.setItem('claude_api_key', apiKey);
  localStorage.setItem('claude_system_prompt', systemPrompt);
  document.getElementById('settings-panel').style.display = 'none';
  updateSendButton();
  if (apiKey) setStatus(tableauReady ? 'ready' : 'ready', 'Ready');
  appendMessage('system', 'Settings saved ✓');
}

// ── Suggestions ────────────────────────────────────────────────────────────
function renderSuggestions(items) {
  const container = document.getElementById('suggestions');
  container.innerHTML = items.map(s =>
    `<div class="suggestion" onclick="useSuggestion(this)">${s}</div>`
  ).join('');
}

function useSuggestion(el) {
  document.getElementById('user-input').value = el.textContent;
  sendMessage();
}

// ── Messaging ──────────────────────────────────────────────────────────────
function updateSendButton() {
  const btn = document.getElementById('send-btn');
  btn.disabled = !apiKey || isLoading;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text || isLoading || !apiKey) return;

  // Clear empty state
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  // Hide suggestions after first use
  document.getElementById('suggestions').style.display = 'none';

  input.value  = '';
  input.style.height = 'auto';
  isLoading    = true;
  updateSendButton();

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const typingId = appendTyping();
  setStatus('loading', 'Thinking…');

  try {
    const reply = await callClaude(text);
    removeTyping(typingId);
    appendMessage('claude', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    setStatus('ready', 'Ready');
  } catch(err) {
    removeTyping(typingId);
    const errMsg = err.message || 'Unknown error';
    appendMessage('system', `Error: ${errMsg}`);
    setStatus('error', 'Error');
    console.error(err);
  }

  isLoading = false;
  updateSendButton();
}

async function callClaude(userMessage) {
  // Build system prompt
  const dataContext = dashboardData
    ? JSON.stringify(dashboardData, null, 2).slice(0, 12000)
    : 'No dashboard data available.';

  const sysPrompt = (systemPrompt ||
    'You are a helpful data analyst embedded in a Tableau dashboard.') +
    `\n\nYou are viewing the Tableau dashboard: "${dashboardName}".\n` +
    `Here is the current dashboard data (up to 200 rows per sheet):\n\`\`\`json\n${dataContext}\n\`\`\`\n` +
    `Answer the user's questions based on this data. Be concise and specific. ` +
    `Format numbers clearly. If you reference specific values, cite them directly from the data.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type':         'application/json',
      'x-api-key':            apiKey,
      'anthropic-version':    '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model:      'claude-sonnet-4-6',
      max_tokens: 1024,
      system:     sysPrompt,
      messages:   conversationHistory,
    }),
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  return data.content?.[0]?.text || '(No response)';
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const messages = document.getElementById('messages');
  const div      = document.createElement('div');
  div.className  = `msg ${role}`;

  const labels   = { user: 'You', claude: 'Claude', system: '' };
  const label    = labels[role] || '';

  div.innerHTML = `
    ${label ? `<div class="msg-label">${label}</div>` : ''}
    <div class="msg-body">${escapeHtml(text)}</div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function appendTyping() {
  const messages = document.getElementById('messages');
  const id       = 'typing-' + Date.now();
  const div      = document.createElement('div');
  div.id         = id;
  div.className  = 'msg claude';
  div.innerHTML  = `
    <div class="msg-label">Claude</div>
    <div class="msg-body">
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
      <span class="typing-dot"></span>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function setStatus(state, title) {
  const dot = document.getElementById('status-dot');
  dot.className  = 'status-dot ' + state;
  dot.id         = 'status-dot';
  dot.className  = state;
  dot.title      = title;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
</script>
</body>
